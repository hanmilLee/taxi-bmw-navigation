server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Kakao Local API 프록시 (장소 검색/자동완성)
    location /kakao-local/ {
        proxy_pass https://dapi.kakao.com/;
        proxy_set_header Host dapi.kakao.com;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Kakao Mobility API 프록시 (택시 경로)
    location /kakao-mobility/ {
        proxy_pass https://apis-navi.kakaomobility.com/;
        proxy_set_header Host apis-navi.kakaomobility.com;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA 라우팅: 모든 경로를 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 파일 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
